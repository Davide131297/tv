name: TV Ratings Crawl

on:
  schedule:
    # Jeden Tag um 15:00 Uhr UTC (= 16:00 Uhr MEZ / 17:00 Uhr MESZ)
    - cron: "0 15 * * *"
  workflow_dispatch:

jobs:
  crawl-tv-ratings:
    name: Crawl TV Ratings
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: TV-Ratings API aufrufen
        run: |
          echo "🚀 Starte TV-Ratings-Crawler..."
          RESPONSE_BODY=$(mktemp)

          http_code=$(curl --write-out "%{http_code}" \
            --silent --show-error --output "$RESPONSE_BODY" \
            --request POST \
            --header "Authorization: Bearer ${{ secrets.CRAWL_API_KEY }}" \
            --header "Content-Type: application/json" \
            "${{ secrets.DEPLOYMENT_URL }}/api/crawl/tv-ratings")

          echo "::group::API-Antwort"
          if command -v jq >/dev/null 2>&1; then
            jq . "$RESPONSE_BODY" || cat "$RESPONSE_BODY"
          else
            cat "$RESPONSE_BODY"
          fi
          echo "::endgroup::"

          echo "::group::Gespeicherte TV-Ratings"
          if command -v jq >/dev/null 2>&1 && jq -e '.results' "$RESPONSE_BODY" >/dev/null 2>&1; then
            jq -r '
              .results
              | to_entries[]
              | .key as $sender
              | .value as $result
              | if ($result.savedCount // 0) == 0 then
                  "\($sender): nichts gespeichert (gefunden: \($result.found // 0), mit Politikern: \($result.eligible // 0))"
                else
                  "\($sender): \($result.savedCount) gespeichert",
                  ($result.saved[] | "  - \(.show_name) | \(.episode_date) | \(.market_share)% | \(.viewers_millions) Mio.")
                end
            ' "$RESPONSE_BODY"
          else
            cat "$RESPONSE_BODY"
          fi
          echo "::endgroup::"

          if [ "$http_code" -ne 200 ]; then
            echo "::error::TV-Ratings-Crawler fehlgeschlagen (HTTP $http_code)"
            rm "$RESPONSE_BODY"
            exit 1
          fi

          rm "$RESPONSE_BODY"
          echo "✅ TV-Ratings-Crawler erfolgreich abgeschlossen."

      - name: Fehler melden
        if: failure()
        run: |
          echo "❌ TV-Ratings-Crawler fehlgeschlagen."
          exit 1
